<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>昆明全市 · GIS 建筑 Demo</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #071018;
      --panel: rgba(8, 18, 28, 0.82);
      --line: rgba(64, 196, 255, 0.35);
      --text: #e8f6ff;
      --muted: #8fb4c9;
      --accent: #3ec8ff;
      --warn: #f0b35a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #map {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    #map { position: absolute; inset: 0; }

    .panel {
      position: absolute;
      z-index: 20;
      top: 18px;
      left: 18px;
      width: min(340px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-handle {
      display: none;
    }

    .panel-toggle {
      display: none;
    }

    .panel-body {
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }

    .row span:last-child { color: var(--accent); font-variant-numeric: tabular-nums; text-align: right; }

    .badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--warn);
      border: 1px solid rgba(240, 179, 90, 0.4);
      background: rgba(240, 179, 90, 0.12);
      vertical-align: middle;
    }

    .districts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0 4px;
    }

    .districts button {
      border: 1px solid rgba(62, 200, 255, 0.25);
      background: rgba(62, 200, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .districts button:hover,
    .districts button.active {
      background: rgba(62, 200, 255, 0.22);
      border-color: var(--accent);
    }

    .community-panel {
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.22);
      overflow: hidden;
      display: none;
    }

    .community-panel.show { display: block; }

    .community-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      color: var(--muted);
    }

    .community-panel-head strong {
      color: var(--text);
      font-size: 13px;
    }

    .community-list {
      max-height: 180px;
      overflow: auto;
      padding: 6px;
      display: grid;
      gap: 4px;
    }

    .community-list button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }

    .community-list button:hover,
    .community-list button.active {
      background: rgba(62, 200, 255, 0.14);
    }

    .community-list button span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .community-list .section-label {
      padding: 8px 10px 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .community-marker.street-marker {
      border-style: dashed;
      opacity: 0.95;
    }

    .community-marker .mk-name {
      display: block;
      font-weight: 650;
    }

    .community-marker .mk-count {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      opacity: 0.9;
      font-weight: 500;
    }

    .search-box { position: relative; margin: 12px 0 4px; }

    .search-box input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border-radius: 9px;
      border: 1px solid rgba(62, 200, 255, 0.28);
      background: rgba(0, 0, 0, 0.28);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      outline: none;
    }

    .search-box input::placeholder { color: var(--muted); }
    .search-box input:focus { border-color: var(--accent); }

    .search-results {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      max-height: 180px;
      overflow: auto;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(8, 18, 28, 0.98);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
      z-index: 30;
    }

    .search-results.show { display: block; }

    .search-results button {
      display: flex;
      width: 100%;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 12px;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }

    .search-results button:last-child { border-bottom: 0; }
    .search-results button:hover { background: rgba(62, 200, 255, 0.14); }
    .search-results button span { color: var(--muted); font-size: 12px; }
    .search-empty { padding: 10px 12px; font-size: 12px; color: var(--muted); }

    .basemap {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .basemap button {
      flex: 1;
      border: 1px solid rgba(62, 200, 255, 0.25);
      background: rgba(62, 200, 255, 0.08);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 0;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .basemap button:hover,
    .basemap button.active {
      background: rgba(62, 200, 255, 0.22);
      border-color: var(--accent);
    }

    .hint {
      position: absolute;
      z-index: 2;
      right: 18px;
      bottom: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      backdrop-filter: blur(10px);
      max-width: min(420px, calc(100vw - 36px));
    }

    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-logo { opacity: 0.55; }

    .maplibregl-popup-content {
      background: rgba(8, 18, 28, 0.92);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
      min-width: 160px;
    }

    .maplibregl-popup-anchor-bottom .maplibregl-popup-tip {
      border-top-color: rgba(8, 18, 28, 0.92);
    }

    .maplibregl-popup-close-button {
      color: var(--muted);
      font-size: 18px;
      padding: 4px 8px;
    }

    .popup-community {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .popup-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .community-marker,
    .district-marker {
      border: 1px solid rgba(126, 216, 255, 0.7);
      background: rgba(8, 18, 28, 0.88);
      color: #7ed8ff;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      font-family: inherit;
    }

    .district-marker {
      border-color: rgba(240, 179, 90, 0.7);
      color: #f0b35a;
      font-weight: 650;
    }

    .community-marker:hover,
    .district-marker:hover,
    .community-marker.active-community {
      background: rgba(62, 200, 255, 0.22);
      color: #e8f6ff;
    }

    .community-marker.active-community {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(62, 200, 255, 0.25);
    }

    /* —— 手机自适应 —— */
    @media (max-width: 768px) {
      .panel {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-height: min(58vh, 520px);
        padding:
          6px
          max(12px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom))
          max(12px, env(safe-area-inset-left));
        border-radius: 16px 16px 0 0;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.45);
        transition: max-height 0.28s ease;
      }

      .panel.collapsed {
        max-height: calc(64px + env(safe-area-inset-bottom));
      }

      .panel.collapsed .panel-body {
        display: none;
      }

      .panel-handle {
        display: block;
        width: 40px;
        height: 4px;
        margin: 4px auto 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.28);
        flex-shrink: 0;
      }

      .panel-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        flex-shrink: 0;
        border: 0;
        background: transparent;
        color: var(--text);
        font: inherit;
        padding: 4px 4px 10px;
        cursor: pointer;
        text-align: left;
      }

      .panel-toggle .toggle-title {
        font-size: 15px;
        font-weight: 650;
      }

      .panel-toggle .toggle-meta {
        display: block;
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
      }

      .panel-toggle .toggle-chevron {
        color: var(--accent);
        font-size: 12px;
        transition: transform 0.2s ease;
      }

      .panel.collapsed .panel-toggle .toggle-chevron {
        transform: rotate(180deg);
      }

      .eyebrow { display: none; }
      .sub { display: none; }

      h1 {
        font-size: 16px;
        margin-bottom: 8px;
      }

      .row {
        padding: 6px 0;
        font-size: 12px;
      }

      .stats-block .row:nth-child(n+4) {
        display: none;
      }

      .districts {
        margin: 8px 0 4px;
        gap: 8px;
      }

      .districts button {
        min-height: 36px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .community-list {
        max-height: min(28vh, 220px);
      }

      .community-list button {
        min-height: 40px;
        padding: 10px 12px;
        font-size: 14px;
      }

      .search-box input {
        height: 42px;
        font-size: 16px;
      }

      .basemap button {
        min-height: 40px;
        font-size: 13px;
      }

      .hint {
        left: 12px;
        right: 12px;
        bottom: calc(72px + env(safe-area-inset-bottom));
        max-width: none;
        font-size: 11px;
        padding: 8px 12px;
        text-align: center;
        pointer-events: none;
      }

      body:has(.panel:not(.collapsed)) .hint {
        display: none;
      }

      .maplibregl-ctrl-top-right {
        top: max(8px, env(safe-area-inset-top));
        right: 8px;
      }

      .maplibregl-ctrl-bottom-right,
      .maplibregl-ctrl-bottom-left {
        bottom: calc(72px + env(safe-area-inset-bottom));
      }

      .community-marker,
      .district-marker {
        padding: 6px 9px;
        font-size: 11px;
        max-width: 42vw;
        white-space: normal;
        text-align: center;
        line-height: 1.25;
      }

      .community-marker .mk-count {
        font-size: 10px;
      }

      .maplibregl-popup-content {
        max-width: min(280px, calc(100vw - 48px));
      }
    }

    @media (max-width: 380px) {
      .panel.collapsed {
        max-height: calc(58px + env(safe-area-inset-bottom));
      }

      h1 { font-size: 15px; }
      .badge { display: none; }
    }

    @media (min-width: 769px) {
      .panel.collapsed {
        max-height: calc(100vh - 36px);
      }

      .panel.collapsed .panel-body {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <aside class="panel collapsed" id="panel">
    <div class="panel-handle" aria-hidden="true"></div>
    <button type="button" class="panel-toggle" id="panel-toggle" aria-expanded="false" aria-controls="panel-body">
      <span>
        <span class="toggle-title">昆明建筑 Demo</span>
        <span class="toggle-meta" id="panel-toggle-meta">点开选择区县</span>
      </span>
      <span class="toggle-chevron" aria-hidden="true">▲</span>
    </button>
    <div class="panel-body" id="panel-body">
      <div class="eyebrow">Kunming City Demo</div>
      <h1>昆明全市建筑 Demo <span class="badge">全市</span></h1>
      <p class="sub">小区名称来自公开小区名录（真实名称）；街道来自 OSM。地图主要标注小区并按形态画 Demo 地块，不改本地 geojson。</p>

      <div class="stats-block">
        <div class="row"><span>模式</span><span id="mode">全市总览</span></div>
        <div class="row"><span>加载状态</span><span id="status">就绪</span></div>
        <div class="row"><span>当前视窗建筑</span><span id="count">0</span></div>
        <div class="row"><span>高度范围</span><span id="range">—</span></div>
        <div class="row"><span>目前选中</span><span id="picked">点击建筑</span></div>
      </div>

      <div class="districts" id="districts"></div>
      <div class="community-panel" id="community-panel">
        <div class="community-panel-head">
          <div><strong id="community-panel-title">小区列表</strong></div>
          <span id="community-panel-count">0</span>
        </div>
        <div class="community-list" id="community-list"></div>
      </div>

      <div class="search-box">
        <input id="community-search" type="search" placeholder="搜索区县 / 小区" autocomplete="off" enterkeyhint="search" />
        <div class="search-results" id="community-results"></div>
      </div>

      <div class="basemap">
        <button type="button" data-style="satellite" class="active">卫星</button>
        <button type="button" data-style="dark">深色</button>
        <button type="button" data-style="light">浅色</button>
      </div>
    </div>
  </aside>

  <div class="hint">上滑/点开面板选区县 · 地图可双指缩放</div>

    function communityBBox(district, pad = 0.012) {
      const pts = (district.communities && district.communities.length
        ? district.communities
        : placesOf(district)
      ).map((c) => c.center);
      if (!pts.length) {
        const [lon, lat] = district.center;
        return [lon - pad, lat - pad, lon + pad, lat + pad];
      }
      const lons = pts.map((p) => p[0]);
      const lats = pts.map((p) => p[1]);
      return [
        Math.min(...lons) - pad,
        Math.min(...lats) - pad,
        Math.max(...lons) + pad,
        Math.max(...lats) + pad
      ];
    }

    // 稳定伪随机：同一小区每次生成相同楼栋布局
    function hashSeed(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(a) {
      return function () {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function estimateDemoCount(name) {
      const h = hashSeed(String(name || "x"));
      return 6 + (h % 19); // 6–24
    }

    function haversineM(a, b) {
      const toRad = (d) => (d * Math.PI) / 180;
      const R = 6371000;
      const dLat = toRad(b[1] - a[1]);
      const dLon = toRad(b[0] - a[0]);
      const lat1 = toRad(a[1]);
      const lat2 = toRad(b[1]);
      const h =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }

    async function overpassJson(query, timeoutMs = 8000) {
      let lastErr = null;
      for (const url of OVERPASS_ENDPOINTS) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: "data=" + encodeURIComponent(query),
            signal: ctrl.signal
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          return await res.json();
        } catch (err) {
          lastErr = err;
        } finally {
          clearTimeout(timer);
        }
      }
      throw lastErr || new Error("Overpass failed");
    }

    async function fetchOsmBuildingCounts(district) {
      const communities = district.communities || [];
      if (!communities.length) return false;
      const bbox = communityBBox(district, 0.004);
      const [west, south, east, north] = bbox;
      const query =
        `[out:json][timeout:20];` +
        `way["building"](${south},${west},${north},${east});` +
        `out center;`;
      const osm = await overpassJson(query, 8000);
      const pts = [];
      for (const el of osm.elements || []) {
        if (el.type !== "way" || !el.center) continue;
        pts.push([el.center.lon, el.center.lat]);
      }
      if (!pts.length) return false;

      const counts = communities.map(() => 0);
      const MAX_M = district.sample ? 220 : 280;
      pts.forEach((p) => {
        let best = -1;
        let bestD = Infinity;
        communities.forEach((c, i) => {
          const d = haversineM(p, c.center);
          if (d < bestD) {
            bestD = d;
            best = i;
          }
        });
        if (best >= 0 && bestD <= MAX_M) counts[best] += 1;
      });

      let hit = 0;
      communities.forEach((c, i) => {
        if (counts[i] > 0) {
          c.count = counts[i];
          c.countSource = "osm";
          hit += 1;
        }
      });
      return hit > 0;
    }

    function fillDemoCounts(district) {
      (district.communities || []).forEach((c) => {
        if (!(Number(c.count) > 0)) {
          c.count = estimateDemoCount(c.name);
          c.countSource = "demo";
        } else if (!c.countSource) {
          c.countSource = district.sample ? "sample" : "known";
        }
      });
    }

    // 先本地填栋数保证可点开；OSM 统计后台刷新，不阻塞 UI
    async function ensureCommunityCounts(district) {
      if (!district || district._countsReady) return;
      const communities = district.communities || [];
      if (!communities.length) {
        district._countsReady = true;
        return;
      }

      fillDemoCounts(district);
      district._countsReady = true;

      const needOsm = communities.some((c) => c.countSource === "demo");
      if (!needOsm) return;

      // 后台升级栋数，失败就保持 demo
      fetchOsmBuildingCounts(district)
        .then((ok) => {
          if (!ok || activeDistrict !== district) return;
          // 清掉该区建筑缓存，按新栋数重绘
          Object.keys(buildingsByDistrict).forEach((k) => {
            if (k === district.name || k.startsWith(district.name + "::")) {
              delete buildingsByDistrict[k];
            }
          });
          showAreaCommunityMarkers(district);
          renderCommunityList(district);
          if (activeCommunityName) highlightAreaMarkers(activeCommunityName);
          loadDistrictBuildings(district, activeCommunityName
            ? placesOf(district).find((p) => p.name === activeCommunityName)
            : null);
          setStatus(`${district.name} · 栋数已用 OSM 更新`);
        })
        .catch((err) => {
          console.warn("栋数抓取失败，沿用 Demo", err);
        });
    }

    function rectPolygon(lon, lat, wDeg, hDeg, rot) {
      const cos = Math.cos(rot);
      const sin = Math.sin(rot);
      const corners = [
        [-wDeg / 2, -hDeg / 2],
        [wDeg / 2, -hDeg / 2],
        [wDeg / 2, hDeg / 2],
        [-wDeg / 2, hDeg / 2],
        [-wDeg / 2, -hDeg / 2]
      ];
      return corners.map(([dx, dy]) => {
        const x = dx * cos - dy * sin;
        const y = dx * sin + dy * cos;
        return [lon + x, lat + y];
      });
    }

    function irregularFootprint(clon, clat, w, h, rand, rot) {
      // 略不规则的小区地块轮廓（近似封闭地块）
      const cos = Math.cos(rot);
      const sin = Math.sin(rot);
      const ring = [];
      const steps = 8;
      for (let i = 0; i <= steps; i++) {
        const t = (i % steps) / steps * Math.PI * 2;
        const bulge = 0.82 + rand() * 0.28;
        const dx = Math.cos(t) * (w / 2) * bulge;
        const dy = Math.sin(t) * (h / 2) * bulge;
        // 压成更方的地块
        const sx = dx * (0.75 + 0.25 * Math.abs(Math.cos(t)));
        const sy = dy * (0.75 + 0.25 * Math.abs(Math.sin(t)));
        const x = sx * cos - sy * sin;
        const y = sx * sin + sy * cos;
        ring.push([clon + x, clat + y]);
      }
      return ring;
    }

    function pushBuilding(features, id, place, district, lon, lat, w, h, rot, levels) {
      features.push({
        type: "Feature",
        properties: {
          id,
          name: `${place.name}-楼栋`,
          community: place.name,
          placeType: place.type || "community",
          district: district.name,
          color: district.color,
          height: levels * LEVEL_HEIGHT,
          levels
        },
        geometry: {
          type: "Polygon",
          coordinates: [rectPolygon(lon, lat, w, h, rot)]
        }
      });
    }

    // 按小区形态布局：围合庭院 / 行列式 / U 形；街道用条带
    function makeDemoBuildingsForPlace(place, district, idBase) {
      const rand = mulberry32(hashSeed(district.name + "::" + place.name));
      const isStreet = place.type === "street";
      const [clon, clat] = place.center;
      const features = [];
      const rot = (rand() - 0.5) * 0.35;
      const cos = Math.cos(rot);
      const sin = Math.sin(rot);

      function localToLonLat(lx, ly) {
        return [clon + lx * cos - ly * sin, clat + lx * sin + ly * cos];
      }

      let footprint;
      let n = 0;

      if (isStreet) {
        // 街道：沿一条主轴的条带楼栋
        const length = 0.0018 + rand() * 0.0012;
        const width = 0.00055 + rand() * 0.00025;
        footprint = irregularFootprint(clon, clat, length, width, rand, rot);
        const count = 7 + Math.floor(rand() * 5);
        for (let i = 0; i < count; i++) {
          const t = (i + 0.5) / count - 0.5;
          const [lon, lat] = localToLonLat(t * length * 0.85, (rand() - 0.5) * width * 0.25);
          const w = 0.00014 + rand() * 0.00012;
          const h = 0.00011 + rand() * 0.00008;
          const levels = 4 + Math.floor(rand() * 7);
          n += 1;
          pushBuilding(features, idBase + n, place, district, lon, lat, w, h, rot + (rand() - 0.5) * 0.1, levels);
        }
      } else {
        // 小区：三种常见形态
        const morph = Math.floor(rand() * 3); // 0 围合 1 行列 2 U形
        const siteW = 0.00135 + rand() * 0.0009;
        const siteH = 0.00115 + rand() * 0.0008;
        footprint = irregularFootprint(clon, clat, siteW, siteH, rand, rot);
        const bw = 0.00016 + rand() * 0.0001;
        const bh = 0.00012 + rand() * 0.00008;

        if (morph === 0) {
          // 围合庭院：四边排布
          const sides = [
            { dir: "n", count: 3 + Math.floor(rand() * 2) },
            { dir: "s", count: 3 + Math.floor(rand() * 2) },
            { dir: "e", count: 2 + Math.floor(rand() * 2) },
            { dir: "w", count: 2 + Math.floor(rand() * 2) }
          ];
          sides.forEach((side) => {
            for (let i = 0; i < side.count; i++) {
              const t = (i + 0.5) / side.count - 0.5;
              let lx = 0;
              let ly = 0;
              let bRot = rot;
              if (side.dir === "n") { lx = t * siteW * 0.72; ly = siteH * 0.34; bRot = rot; }
              if (side.dir === "s") { lx = t * siteW * 0.72; ly = -siteH * 0.34; bRot = rot; }
              if (side.dir === "e") { lx = siteW * 0.34; ly = t * siteH * 0.55; bRot = rot + Math.PI / 2; }
              if (side.dir === "w") { lx = -siteW * 0.34; ly = t * siteH * 0.55; bRot = rot + Math.PI / 2; }
              const [lon, lat] = localToLonLat(lx, ly);
              const levels = 8 + Math.floor(rand() * 14);
              n += 1;
              pushBuilding(features, idBase + n, place, district, lon, lat, bw, bh, bRot, levels);
            }
          });
          // 中心会所/矮楼
          const [lon, lat] = localToLonLat((rand() - 0.5) * siteW * 0.1, (rand() - 0.5) * siteH * 0.1);
          n += 1;
          pushBuilding(features, idBase + n, place, district, lon, lat, bw * 1.3, bh * 1.1, rot, 3 + Math.floor(rand() * 3));
        } else if (morph === 1) {
          // 行列式
          const rows = 3 + Math.floor(rand() * 2);
          const cols = 3 + Math.floor(rand() * 2);
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (rand() < 0.08) continue;
              const lx = ((c + 0.5) / cols - 0.5) * siteW * 0.78;
              const ly = ((r + 0.5) / rows - 0.5) * siteH * 0.78;
              const [lon, lat] = localToLonLat(lx, ly);
              const levels = 10 + Math.floor(rand() * 12);
              n += 1;
              pushBuilding(features, idBase + n, place, district, lon, lat, bw * 1.35, bh * 0.85, rot, levels);
            }
          }
        } else {
          // U 形开口
          const open = Math.floor(rand() * 4); // 0北开 1东 2南 3西
          const slots = [];
          for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 3; j++) {
              const t = (j + 0.5) / 3 - 0.5;
              if (i === 0 && open !== 0) slots.push([t * siteW * 0.7, siteH * 0.32, rot]);
              if (i === 1 && open !== 1) slots.push([siteW * 0.32, t * siteH * 0.55, rot + Math.PI / 2]);
              if (i === 2 && open !== 2) slots.push([t * siteW * 0.7, -siteH * 0.32, rot]);
              if (i === 3 && open !== 3) slots.push([-siteW * 0.32, t * siteH * 0.55, rot + Math.PI / 2]);
            }
          }
          slots.forEach(([lx, ly, bRot]) => {
            const [lon, lat] = localToLonLat(lx, ly);
            const levels = 9 + Math.floor(rand() * 13);
            n += 1;
            pushBuilding(features, idBase + n, place, district, lon, lat, bw, bh, bRot, levels);
          });
        }

        // 按栋数补足/截断到目标
        const target = place.count
          ? Math.max(4, Math.min(Number(place.count), 40))
          : n;
        while (n < target) {
          const lx = (rand() - 0.5) * siteW * 0.55;
          const ly = (rand() - 0.5) * siteH * 0.55;
          const [lon, lat] = localToLonLat(lx, ly);
          n += 1;
          pushBuilding(features, idBase + n, place, district, lon, lat, bw * 0.9, bh * 0.9, rot, 8 + Math.floor(rand() * 10));
        }
        if (features.length > target) features.length = target;
      }

      if (place.type !== "street" && Number(place.count) > 0) {
        // 标注用栋数与生成楼栋对齐
        place.count = features.length;
      }

      const labelFeature = {
        type: "Feature",
        properties: {
          name: place.name,
          placeType: place.type || "community",
          district: district.name,
          color: district.color,
          buildingCount: Number(place.count) || features.length
        },
        geometry: { type: "Point", coordinates: [clon, clat] }
      };

      const footprintFeature = {
        type: "Feature",
        properties: {
          name: place.name,
          placeType: place.type || "community",
          district: district.name,
          color: district.color,
          buildingCount: Number(place.count) || features.length
        },
        geometry: { type: "Polygon", coordinates: [footprint] }
      };

      return { buildings: features, footprint: footprintFeature, label: labelFeature };
    }

    function buildDemoBuildings(district, focusPlace) {
      // 默认只为真实小区生成形态；点中街道时才画该街道条带
      const places = focusPlace
        ? [focusPlace]
        : (district.communities || []).map((p) => ({ ...p, type: "community" }));
      let idBase = hashSeed(district.name) % 1000000;
      const buildings = [];
      const footprints = [];
      const labels = [];
      places.forEach((p, idx) => {
        const chunk = makeDemoBuildingsForPlace(p, district, idBase + idx * 200);
        buildings.push(...chunk.buildings);
        footprints.push(chunk.footprint);
        labels.push(chunk.label);
      });
      return {
        buildings: { type: "FeatureCollection", features: buildings },
        footprints: { type: "FeatureCollection", features: footprints },
        labels: { type: "FeatureCollection", features: labels }
      };
    }

    function setCommunityAnno(footprints, labels) {
      if (map.getSource("community-footprints")) {
        map.getSource("community-footprints").setData(footprints || { type: "FeatureCollection", features: [] });
      }
      // labels 仍写入，供后续扩展；名称以 HTML marker 显示（中文更稳）
      if (map.getSource("community-labels")) {
        map.getSource("community-labels").setData(labels || { type: "FeatureCollection", features: [] });
      }
    }

    async function loadDistrictBuildings(district, focusCommunity) {
      if (!district) return;
      ensureBuildingLayers();
      const token = ++loadToken;
      setBuildingsVisible(true);
      setStatus(`${district.name} 楼栋绘制中…`);

      const cacheKey = focusCommunity
        ? `${district.name}::${focusCommunity.name}`
        : district.name;

      if (buildingsByDistrict[cacheKey]) {
        if (token !== loadToken) return;
        const cached = buildingsByDistrict[cacheKey];
        map.getSource("buildings").setData(cached.buildings);
        setCommunityAnno(cached.footprints, cached.labels);
        updateStats(cached.buildings.features);
        showAreaCommunityMarkers(district);
        renderCommunityList(district);
        if (activeCommunityName) highlightAreaMarkers(activeCommunityName);
        setStatus(`${district.name} · ${cached.buildings.features.length} 栋`);
        return;
      }

      // 金江路样板全区：本地轮廓 + Demo 标注地块
      if (district.sample && !focusCommunity) {
        const local = await loadLocalBuildings();
        if (token !== loadToken) return;
        if (local && local.features && local.features.length) {
          const painted = paintFeatures(local, district);
          const demo = buildDemoBuildings(district, null);
          // 建筑用真实轮廓，地块/标注用 demo 形态
          const cached = {
            buildings: painted,
            footprints: demo.footprints,
            labels: demo.labels
          };
          buildingsByDistrict[cacheKey] = cached;
          map.getSource("buildings").setData(cached.buildings);
          setCommunityAnno(cached.footprints, cached.labels);
          updateStats(cached.buildings.features);
          showAreaCommunityMarkers(district);
          renderCommunityList(district);
          setStatus(`${district.name} · 样板 ${cached.buildings.features.length} 栋`);
          return;
        }
      }

      const demo = buildDemoBuildings(district, focusCommunity || null);
      if (token !== loadToken) return;
      buildingsByDistrict[cacheKey] = demo;
      map.getSource("buildings").setData(demo.buildings);
      setCommunityAnno(demo.footprints, demo.labels);
      updateStats(demo.buildings.features);
      showAreaCommunityMarkers(district);
      renderCommunityList(district);
      if (activeCommunityName) highlightAreaMarkers(activeCommunityName);
      const osmN = (district.communities || []).filter((c) => c.countSource === "osm").length;
      const srcHint = osmN ? `OSM统计 ${osmN} 个小区` : "Demo 栋数";
      setStatus(`${district.name} · ${demo.buildings.features.length} 栋（${srcHint}）`);
    }

    function selectDistrict(district, opts = {}) {
      const { fly = true, keepList = false } = opts;
      activeDistrict = district;
      if (!keepList) activeCommunityName = null;

      document.querySelectorAll("#districts button").forEach((b) => {
        b.classList.toggle("active", b.dataset.name === district.name);
      });

      // 同步填栋数并立刻展开，不阻塞点击
      ensureCommunityCounts(district);
      renderCommunityList(district);
      showAreaCommunityMarkers(district);
      setMode(`${district.name} · 小区+栋数`);
      loadDistrictBuildings(district);
      if (isMobileLayout()) setPanelExpanded(true);

      if (fly) {
        const bbox = communityBBox(district, 0.008);
        map.fitBounds(
          [[bbox[0], bbox[1]], [bbox[2], bbox[3]]],
          {
            padding: 60,
            duration: 900,
            pitch: district.sample ? 55 : 48,
            maxZoom: district.sample ? 16.6 : 15.6
          }
        );
        const withCount = (district.communities || []).filter((c) => Number(c.count) > 0).length;
        popup
          .setLngLat(district.center)
          .setHTML(
            `<div class="popup-community" style="color:${district.color}">${district.name}</div>` +
            `<div class="popup-meta">已标注 ${withCount} 个小区栋数 · 地图显示「名称 + N栋」</div>`
          )
          .addTo(map);
      }
    }

    function renderSearchResults(list) {
      const box = document.getElementById("community-results");
      if (!list.length) {
        box.innerHTML = `<div class="search-empty">没有匹配</div>`;
        box.classList.add("show");
        return;
      }
      box.innerHTML = list.map((f, i) => {
        const name = f.properties.community;
        let tag = "小区";
        if (f.properties.kind === "district") tag = f.properties.sample ? "样板" : "区县";
        else if (f.properties.kind === "street") tag = "街道";
        else if (f.properties.district) tag = f.properties.district;
        return `<button type="button" data-i="${i}"><b>${name}</b><span>${tag}</span></button>`;
      }).join("");
      box.classList.add("show");
      box.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("mousedown", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const f = list[Number(btn.dataset.i)];
          focusPlace(f);
          document.getElementById("community-search").value = f.properties.community;
          box.classList.remove("show");
        });
      });
    }

    function runSearch() {
      const input = document.getElementById("community-search");
      const box = document.getElementById("community-results");
      const q = normalizeName(input.value.trim());
      if (!q) {
        box.classList.remove("show");
        box.innerHTML = "";
        return;
      }
      const hits = searchIndex().features.filter((f) =>
        normalizeName(f.properties.community).includes(q) ||
        normalizeName(f.properties.district || "").includes(q)
      );
      renderSearchResults(hits);
    }

    function bindSearch() {
      const input = document.getElementById("community-search");
      const box = document.getElementById("community-results");
      input.addEventListener("input", runSearch);
      input.addEventListener("focus", runSearch);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const first = box.querySelector("button");
          if (first) first.dispatchEvent(new MouseEvent("mousedown", { bubbles: true }));
        }
        if (e.key === "Escape") box.classList.remove("show");
      });
      document.addEventListener("mousedown", (e) => {
        if (!e.target.closest(".search-box")) box.classList.remove("show");
      });
    }

    function renderDistrictButtons() {
      const wrap = document.getElementById("districts");
      wrap.innerHTML = DISTRICTS.map((d) =>
        `<button type="button" data-name="${d.name}" style="border-color:${d.color}88;box-shadow:inset 0 0 0 1px ${d.color}33">` +
        `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${d.color};margin-right:5px;"></span>${d.name}</button>`
      ).join("");
      wrap.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const d = DISTRICTS.find((x) => x.name === btn.dataset.name);
          if (d) selectDistrict(d, { fly: true });
        });
      });
    }

    function addDistrictMarkers() {
      districtMarkers.forEach((m) => m.remove());
      districtMarkers.length = 0;
      DISTRICTS.filter((d) => !d.sample).forEach((d) => {
        const el = document.createElement("button");
        el.type = "button";
        el.className = "district-marker";
        el.textContent = d.name;
        el.style.borderColor = d.color;
        el.style.color = d.color;
        el.addEventListener("click", (ev) => {
          ev.stopPropagation();
          selectDistrict(d, { fly: true });
        });
        districtMarkers.push(
          new maplibregl.Marker({ element: el, anchor: "bottom" }).setLngLat(d.center).addTo(map)
        );
      });
    }

    function syncDistrictVisibility() {
      const show = map.getZoom() < BUILDING_MIN_ZOOM;
      districtMarkers.forEach((m) => {
        m.getElement().style.display = show ? "" : "none";
      });
    }

    function switchBasemap(name) {
      const cfg = BASEMAP_TILES[name];
      if (!cfg || !map.getSource("basemap")) return;
      currentBasemap = name;
      if (map.getLayer("basemap")) map.removeLayer("basemap");
      map.removeSource("basemap");
      map.addSource("basemap", {
        type: "raster",
        tiles: cfg.tiles,
        tileSize: 256,
        attribution: cfg.attribution,
        // 高德/Carto 路网一般到 18 级
        maxzoom: 18
      });
      // 始终插到最底层（建筑/地块之下）
      const beforeId =
        map.getLayer("community-footprint-fill") ? "community-footprint-fill" :
        map.getLayer("buildings-3d") ? "buildings-3d" :
        undefined;
      map.addLayer({ id: "basemap", type: "raster", source: "basemap", paint: cfg.paint }, beforeId);
      setStatus(`底图：${name === "satellite" ? "卫星" : name === "dark" ? "深色" : "浅色"}`);
    }

    function clearSelection() {
      if (selectedId != null && map.getSource("buildings")) {
        try { map.setFeatureState({ source: "buildings", id: selectedId }, { selected: false }); } catch (_) {}
      }
      selectedId = null;
      document.getElementById("picked").textContent = "点击建筑";
    }

    function showBuildingPopup(feature, lngLat) {
      const props = feature.properties || {};
      const id = props.id;
      const community = props.community || "未命名";
      const buildingName = props.name || "楼栋";
      const height = props.height != null ? Number(props.height).toFixed(1) : "—";
      const levels = props.levels != null ? Number(props.levels).toFixed(1) : "—";

        selectedId = id;

      }
      document.getElementById("picked").textContent = community;
      popup

        .setHTML(
          `<div class="popup-community">${community}</div>` +
          `<div class="popup-meta">${props.district ? props.district + " · " : ""}楼栋：${buildingName}<br/>高度：${height} m · 约 ${levels} 层</div>`
        )
        .addTo(map);
    }

    function osmToGeoJSON(osm) {
      const nodes = {};
      for (const el of osm.elements || []) {
        if (el.type === "node") nodes[el.id] = [el.lon, el.lat];
      }
      const features = [];
      for (const el of osm.elements || []) {
        if (el.type !== "way" || !el.nodes || !el.tags || !el.tags.building) continue;
        const coords = el.nodes.map((n) => nodes[n]).filter(Boolean);
        if (coords.length < 3) continue;
        const first = coords[0];
        const last = coords[coords.length - 1];
        if (first[0] !== last[0] || first[1] !== last[1]) coords.push(first.slice());
        const tags = el.tags;
        const levelsRaw = parseFloat(tags["building:levels"] || tags.levels || "");
        const heightRaw = parseFloat(String(tags.height || "").replace("m", ""));
        const levels = Number.isFinite(levelsRaw) ? levelsRaw : (Number.isFinite(heightRaw) ? heightRaw / LEVEL_HEIGHT : 4);
        const height = Number.isFinite(heightRaw) ? heightRaw : levels * LEVEL_HEIGHT;
        features.push({
          type: "Feature",
          properties: {
            id: el.id,
            name: tags.name || "楼栋",
            community: tags["addr:neighbourhood"] || tags["addr:suburb"] || tags["addr:district"] || "OSM建筑",
            height: Math.max(6, Math.min(height, 280)),
            levels: Math.max(1, levels),
            building: tags.building
          },
          geometry: { type: "Polygon", coordinates: [coords] }
        });
        if (features.length >= MAX_WAYS) break;
      }
      return { type: "FeatureCollection", features };
    }

    async function fetchOverpass(bbox) {
      const [west, south, east, north] = bbox;
      const query =
        `[out:json][timeout:40];` +
        `way["building"](${south},${west},${north},${east});` +
        `out body ${MAX_WAYS};` +
        `>;out skel qt;`;
      let lastErr = null;
      for (const url of OVERPASS_ENDPOINTS) {
        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: "data=" + encodeURIComponent(query)
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          return await res.json();
        } catch (err) {
          lastErr = err;
        }
      }
      throw lastErr || new Error("Overpass failed");
    }

    function bboxOverlapsSample(bbox) {
      const [west, south, east, north] = bbox;
      const sw = [102.7128, 25.0678];
      const ne = [102.7261, 25.0781];
      return !(east < sw[0] || west > ne[0] || north < sw[1] || south > ne[1]);
    }

    async function loadLocalBuildings() {
      if (localBuildings) return localBuildings;
      try {
        const res = await fetch("./buildings.geojson?v=4");
        if (res.ok) localBuildings = await res.json();
      } catch (_) {}
      return localBuildings;
    }

    async function refreshBuildings() {
      const zoom = map.getZoom();
      syncDistrictVisibility();

      // 已选区县时，由 loadDistrictBuildings 负责，避免被视窗刷新冲掉配色
      if (activeDistrict) {
        setMode(`${activeDistrict.name} · 分区配色`);
        return;
      }

      if (zoom < BUILDING_MIN_ZOOM) {
        setMode("全市总览");
        setStatus("点击区县展开小区并加载同色建筑");
        setBuildingsVisible(false);
        setCommunityAnno(null, null);
        updateStats([]);
        return;
      }

      setMode("街区建筑");
      setBuildingsVisible(true);
      const b = map.getBounds();
      const west = b.getWest();
      const south = b.getSouth();
      const east = b.getEast();
      const north = b.getNorth();
      const token = ++loadToken;
      setStatus("加载中…");

      if (bboxOverlapsSample([west, south, east, north]) && zoom >= 15.5) {
        const local = await loadLocalBuildings();
        if (token !== loadToken) return;
        if (local && local.features && local.features.length) {
          const sample = DISTRICTS.find((d) => d.sample);
          const painted = paintFeatures(local, sample || { name: "样板", color: BUILDING_COLOR });
          map.getSource("buildings").setData(painted);
          updateStats(painted.features);
          setStatus("样板数据（本地）");
          return;
        }
      }

      try {
        const osm = await fetchOverpass([west, south, east, north]);
        if (token !== loadToken) return;
        const geo = osmToGeoJSON(osm);
        // 未选区时用默认色
        const painted = paintFeatures(geo, { name: "视窗", color: BUILDING_COLOR });
        map.getSource("buildings").setData(painted);
        updateStats(painted.features);
        setStatus(geo.features.length ? `OSM 动态 ${geo.features.length} 栋` : "此视窗暂无建筑");
      } catch (err) {
        if (token !== loadToken) return;
        setStatus("加载失败，稍后重试");
        console.warn(err);
      }
    }

    function scheduleRefresh() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(refreshBuildings, 450);
    }

    function bindBuildingEvents() {
      if (eventsBound) return;
      eventsBound = true;
      map.on("mousemove", (e) => {
        if (!map.getLayer("buildings-3d") || map.getLayoutProperty("buildings-3d", "visibility") === "none") {
          map.getCanvas().style.cursor = "";
          return;
        }
        const hits = map.queryRenderedFeatures(e.point, { layers: ["buildings-3d"] });
        map.getCanvas().style.cursor = hits.length ? "pointer" : "";
      });
      map.on("click", (e) => {
        if (!map.getLayer("buildings-3d") || map.getLayoutProperty("buildings-3d", "visibility") === "none") return;
        const hits = map.queryRenderedFeatures(e.point, { layers: ["buildings-3d"] });
        if (hits.length) showBuildingPopup(hits[0], e.lngLat);
        else {
          clearSelection();
          popup.remove();
          if (isMobileLayout()) setPanelExpanded(false);
        }
      });
    }

    map.on("load", async () => {
      await hydrateSampleCommunities();
      ensureBuildingLayers();
      setBuildingsVisible(false);
      bindBuildingEvents();
      renderDistrictButtons();
      addDistrictMarkers();
      syncDistrictVisibility();
      scheduleRefresh();
    });

    map.on("moveend", () => {
      scheduleRefresh();
    });

    map.on("zoomend", () => {
      syncDistrictVisibility();
    });

    document.querySelectorAll(".basemap button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".basemap button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        switchBasemap(btn.dataset.style);
      });
    });

    bindPanelUi();
    bindSearch();
  </script>
</body>
</html>
